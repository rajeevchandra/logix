kind = "web"
previewPath = "/"
title = "MathMatrix Educational Platform"
version = "1.0.0"
id = "artifacts/mathmatrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22324

[services.development]
run = "pnpm --filter @workspace/mathmatrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mathmatrix", "run", "build" ]
publicDir = "artifacts/mathmatrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22324"
BASE_PATH = "/"
